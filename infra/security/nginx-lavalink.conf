# Example reverse proxy for private Lavalink exposure.
# Keep 2333 bound to localhost only and expose this endpoint instead.

limit_req_zone $binary_remote_addr zone=lavalink_rate:10m rate=20r/s;

upstream lavalink_backend {
    server 127.0.0.1:2333;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name lavalink.example.com;

    # Configure real certificates (Let's Encrypt recommended)
    ssl_certificate /etc/letsencrypt/live/lavalink.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lavalink.example.com/privkey.pem;

    # Restrict access to your bot host IPs only.
    allow 1.2.3.4;
    allow 5.6.7.8;
    deny all;

    location / {
        limit_req zone=lavalink_rate burst=40 nodelay;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;

        proxy_pass http://lavalink_backend;
    }
}
