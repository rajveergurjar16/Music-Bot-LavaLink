server:
  port: ${LAVALINK_PORT:2333}
  address: 0.0.0.0

spring:
  main:
    banner-mode: "off"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    lavalink: INFO
  file:
    path: ./logs

lavalink:
  server:
    password: ${LAVALINK_PASSWORD}

    # Core source toggles. YouTube is handled by the dedicated YouTube plugin below.
    sources:
      youtube: false
      soundcloud: true
      bandcamp: true
      twitch: true
      vimeo: true
      http: true
      local: false

    # Keep all common filters enabled for bot-side user commands.
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      rotation: true
      distortion: true
      channelMix: true
      lowPass: true

    # Stability and low-latency tuning for 2 vCPU / 4GB.
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: MEDIUM
    trackStuckThresholdMs: 10000
    playerUpdateInterval: 3
    useSeekGhosting: true
    nonAllocatingFrameBuffer: true
    gc-warnings: true

    # Player/session recovery after restarts or temporary disconnects.
    resuming:
      enabled: true
      key: ${LAVALINK_RESUME_KEY}
      timeout: 120s

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.13.0"
      repository: "https://maven.lavalink.dev/releases"
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.2.0"
      repository: "https://maven.lavalink.dev/releases"

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - WEB
      - ANDROID_VR
    retryLimit: 2

  lavasrc:
    providers:
      - "ytmsearch:%QUERY%"
      - "ytsearch:%QUERY%"
      - "scsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: true
      deezer: true
      yandexmusic: false
      flowerytts: false
    spotify:
      clientId: ${SPOTIFY_CLIENT_ID}
      clientSecret: ${SPOTIFY_CLIENT_SECRET}
      countryCode: IN
      playlistLoadLimit: 6
      albumLoadLimit: 6
    applemusic:
      mediaAPIToken: ${APPLE_MUSIC_TOKEN}
      countryCode: IN
    deezer:
      arl: ${DEEZER_ARL:}
    preferAnonymousToken: true
